services:
  healthdesk:
    build: .
    image: healthdesk-ai:latest
    container_name: healthdesk
    env_file: .env
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: healthdesk-pg
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: healthdesk-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-}
    depends_on:
      - healthdesk
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
