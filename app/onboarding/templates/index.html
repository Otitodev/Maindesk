<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MainDesk — Clinic Setup</title>
  <link rel="stylesheet" href="/maindesk-ds.css" />
</head>
<body class="md-page">
  <div class="md-page__container">
    <div class="md-page__header">
      <h1 class="md-page__title">Clinic setup</h1>
      <p class="md-page__sub">Configure how the front-desk agent answers. Changes take effect immediately.</p>
    </div>
    <form method="post" action="/onboarding?key=__KEY__" class="md-card">
      <div class="md-row">
        <div>
          <label class="md-field-label" for="clinic_name">Clinic name</label>
          <input class="md-input" type="text" id="clinic_name" name="clinic_name" value="__CLINIC_NAME__" placeholder="Harmony Dental" />
        </div>
        <div>
          <label class="md-field-label" for="agent_name">Agent name</label>
          <input class="md-input" type="text" id="agent_name" name="agent_name" value="__AGENT_NAME__" placeholder="MainDesk" />
        </div>
      </div>

      <label class="md-field-label" for="greeting">Voice greeting</label>
      <input class="md-input" type="text" id="greeting" name="greeting" value="__GREETING__" placeholder="Hi, you have reached Harmony Dental. How can I help today?" />
      <div class="md-hint">Spoken verbatim at the start of every voice call. Leave blank for the default.</div>

      <label class="md-field-label" for="timezone">Timezone</label>
      <select class="md-select" id="timezone" name="timezone">__TZ_OPTIONS__</select>

      <div class="md-row">
        <div>
          <label class="md-field-label" for="open_hour">Opens (hour, 0–24)</label>
          <input class="md-input" type="number" id="open_hour" name="open_hour" min="0" max="24" value="__OPEN_HOUR__" />
        </div>
        <div>
          <label class="md-field-label" for="close_hour">Closes (hour, 0–24)</label>
          <input class="md-input" type="number" id="close_hour" name="close_hour" min="0" max="24" value="__CLOSE_HOUR__" />
        </div>
      </div>

      <label class="md-field-label">Working days</label>
      <div class="md-chip-group">__DAYS__</div>

      <label class="md-field-label" for="answer_mode">Answering mode</label>
      <select class="md-select" id="answer_mode" name="answer_mode">
        <option value="always"__MODE_ALWAYS__>Always — handle every contact 24/7</option>
        <option value="after_hours"__MODE_AFTER__>After-hours only — hand off to staff during open hours</option>
      </select>

      <label class="md-field-label" for="faqs">Clinic knowledge / FAQs</label>
      <textarea class="md-textarea" id="faqs" name="faqs" placeholder="Hours, address, parking, insurance accepted, services, doctor names…">__FAQS__</textarea>
      <div class="md-hint">The agent answers from these facts and won't invent anything not listed here.</div>

      <div class="md-form-actions">
        <button type="submit" class="btn btn--primary">Save</button>
        <span class="md-saved">__SAVED__</span>
      </div>
    </form>
  </div>
</body>
</html>
