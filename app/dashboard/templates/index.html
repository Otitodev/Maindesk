<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MainDesk — Staff Console</title>
<link rel="stylesheet" href="/maindesk-ds.css" />
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2"></script>
<style>
  /* Queue-card internals: layout too niche to promote into the DS.
     All colors/spacing come from DS tokens so a token change still
     propagates here. */
  .md-esc-card {
    background: var(--white);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .md-esc-card .row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .md-esc-card .who { font-weight: 600; }
  .md-esc-card .chip {
    font-size: 12px; color: var(--teal-text);
    border: 1px solid var(--border-soft);
    padding: 1px 8px; border-radius: var(--radius-pill);
  }
  .md-esc-card .session, .md-esc-card .when { color: var(--ink-soft); font-size: 12px; }
  .md-esc-card .reason { margin: 8px 0 2px; }
  .md-esc-card .preview { color: var(--ink-soft); font-size: 13px; font-style: italic; }
  .md-esc-card .note-line { color: var(--ink-soft); font-size: 13px; margin-top: 6px; }
  .md-esc-card .actions {
    display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
  }
  .md-esc-card .actions input {
    flex: 1; min-width: 140px;
    background: var(--white);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    color: var(--ink);
    padding: 6px 10px; font-size: 13px;
  }
  .md-esc-card .actions button {
    border: 0; border-radius: var(--radius-md);
    padding: 6px 14px; font-size: 13px;
    font-weight: 600; cursor: pointer;
    background: var(--ink); color: var(--white);
  }
  .md-esc-card .actions button.redirect { background: var(--teal-ui); }
  .md-esc-card .actions button.close { background: var(--ink-soft); }
  .md-esc-card .actions button:hover { filter: brightness(1.05); transform: translateY(-1px); }

  .md-empty {
    color: var(--ink-soft); padding: 24px; text-align: center;
    border: 1px dashed var(--border-soft); border-radius: var(--radius-md);
    background: var(--white);
  }
  .md-booking {
    display: flex; justify-content: space-between; gap: 8px;
    padding: 8px 0; border-bottom: 1px solid var(--border-soft); font-size: 13px;
  }
  .md-booking:last-child { border-bottom: 0; }
  .md-booking .when { color: var(--ink-soft); }

  .md-console-main {
    display: grid; grid-template-columns: 1fr 320px; gap: 20px;
    padding: 20px 28px; max-width: 1200px;
  }
  .md-live { margin-left: auto; color: var(--green-live); font-size: 13px; font-weight: 600; }
  @media (max-width: 900px) {
    .md-console-main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body class="md-page" hx-ext="sse" sse-connect="/staff/events?key=__KEY__">
  <header class="md-topbar">
    <h1 class="md-topbar__title">MainDesk</h1>
    <span class="md-topbar__sub">Staff console — human-in-the-loop checkpoints</span>
    <span class="md-topbar__spacer"></span>
    <nav class="md-topbar__nav">
      <a href="/staff?key=__KEY__" class="is-active">Queue</a>
      <a href="/staff/analytics?key=__KEY__">Analytics</a>
    </nav>
    <span class="md-live">● live</span>
  </header>
  <main class="md-console-main">
    <section>
      <h2 class="md-sectionhead">Escalation queue</h2>
      <div id="queue"
           hx-get="/staff/queue?key=__KEY__"
           hx-trigger="load, sse:escalation, every 10s"
           hx-swap="innerHTML">
        <div class="md-empty">Loading…</div>
      </div>
    </section>
    <aside>
      <h2 class="md-sectionhead">Upcoming bookings</h2>
      <div id="bookings"
           hx-get="/staff/bookings?key=__KEY__"
           hx-trigger="load, every 15s"
           hx-swap="innerHTML">
        <div class="md-empty">Loading…</div>
      </div>
    </aside>
  </main>
</body>
</html>
