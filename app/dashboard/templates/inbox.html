<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MainDesk — Conversations</title>
<link rel="stylesheet" href="/vendor/fonts.css" />
<link rel="stylesheet" href="/maindesk-ds.css" />
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2"></script>
<style>
  /* Two-column inbox layout — page-specific, so it stays here. All
     card/row/button/booking chrome comes from the design system so
     the overview page's HTMX-loaded queue preview looks identical. */
  .inbox-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
  @media (max-width: 900px) { .inbox-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body hx-ext="sse" sse-connect="/staff/events?key=__KEY__">
<div class="md-shell">
  <aside class="md-shell__sidebar">
    <a href="/" class="md-shell__brand">
      <span class="md-shell__mark"></span>
      <span>MainDesk</span>
    </a>
    <nav class="md-shell__nav">
      <span class="md-shell__nav-group-label">Operate</span>
      <a href="/staff?key=__KEY__" class="md-shell__link">Overview</a>
      <a href="/staff/inbox?key=__KEY__" class="md-shell__link is-active">Conversations
        __QUEUE_BADGE__
      </a>
      <a href="/staff/analytics?key=__KEY__" class="md-shell__link">Analytics</a>
      <span class="md-shell__nav-group-label">Setup</span>
      <a href="/onboarding?key=__KEY__" class="md-shell__link">Configure</a>
      <a href="/chat" class="md-shell__link" target="_blank">Preview chat ↗</a>
    </nav>
    <div class="md-shell__foot">
      <span class="md-shell__status-dot"></span>Live
    </div>
  </aside>
  <main class="md-shell__content">
    <div class="md-shell__content-header">
      <h1 class="md-shell__content-title">Conversations</h1>
      <p class="md-shell__content-sub">Moments MainDesk paused so you could weigh in.</p>
    </div>
    <div class="inbox-grid">
      <section>
        <h2 class="md-sectionhead">Needs you</h2>
        <div id="queue"
             hx-get="/staff/queue?key=__KEY__"
             hx-trigger="load, sse:escalation, every 10s"
             hx-swap="innerHTML">
          <div class="md-empty">Loading…</div>
        </div>
      </section>
      <aside>
        <h2 class="md-sectionhead">Upcoming bookings</h2>
        <div id="bookings"
             hx-get="/staff/bookings?key=__KEY__"
             hx-trigger="load, every 15s"
             hx-swap="innerHTML">
          <div class="md-empty">Loading…</div>
        </div>
      </aside>
    </div>
  </main>
</div>
</body>
</html>
