<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MainDesk — Chat with the front desk</title>
  <link rel="stylesheet" href="/vendor/fonts.css" />
  <link rel="stylesheet" href="/maindesk-ds.css" />
  <style>
    /* Page-specific — the chat is full-height single-column, which is not a
       general product-chrome pattern, so it stays here. Everything else
       (bubbles, input, send button) lives in the DS as .md-chat-* / .md-bubble. */
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    .md-chat-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .md-chat-header { padding-bottom: 14px; border-bottom: 1px solid var(--border-soft); }
    .md-chat-header h1 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      margin: 0;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .md-chat-header .sub { font-size: 0.82rem; color: var(--ink-soft); margin-top: 4px; }
    .md-chat-footer { padding-top: 12px; border-top: 1px solid var(--border-soft); }
    .md-chat-hint { color: var(--ink-soft); font-size: 0.74rem; margin-top: 8px; text-align: center; }
    @media (max-width: 600px) {
      .md-chat-wrap { padding: 14px 12px; }
    }
  </style>
</head>
<body class="md-page">
  <div class="md-chat-wrap">
    <header class="md-chat-header">
      <h1>MainDesk <span class="badge"><span class="badge__dot"></span>live</span></h1>
      <div class="sub">Try the front-desk agent. Ask about hours, booking, insurance, or anything a clinic patient would.</div>
    </header>
    <main id="conv" class="md-chat" aria-live="polite"></main>
    <footer class="md-chat-footer">
      <div class="md-chat-inputbar">
        <textarea id="input" class="md-chat-input" rows="1" placeholder="Type a message…" autofocus aria-label="Message"></textarea>
        <button id="send" class="md-chat-send" type="button">Send</button>
      </div>
      <div class="md-chat-hint">Demo mode · synthetic data only · no PHI</div>
    </footer>
  </div>
  <script>
    const conv = document.getElementById('conv');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    let sessionId = sessionStorage.getItem('maindesk-chat-session');
    if (!sessionId) {
      sessionId = 'web-' + Math.random().toString(36).slice(2, 11);
      sessionStorage.setItem('maindesk-chat-session', sessionId);
    }

    function bubble(role, text) {
      const b = document.createElement('div');
      b.className = 'md-bubble md-bubble--' + role;
      b.textContent = text;
      conv.appendChild(b);
      conv.scrollTop = conv.scrollHeight;
    }
    function startTyping() {
      const t = document.createElement('div');
      t.className = 'md-typing'; t.id = 'typing';
      t.innerHTML = '<span></span><span></span><span></span>';
      conv.appendChild(t);
      conv.scrollTop = conv.scrollHeight;
    }
    function stopTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }
    function errorBubble(text) {
      const e = document.createElement('div');
      e.className = 'md-chat-error'; e.textContent = text;
      conv.appendChild(e);
      conv.scrollTop = conv.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = ''; input.style.height = 'auto';
      bubble('user', text);
      send.disabled = true;
      startTyping();
      try {
        const res = await fetch('/webhooks/web', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, content: text }),
        });
        stopTyping();
        if (!res.ok) {
          errorBubble('The server returned ' + res.status + '. Try again in a moment.');
          return;
        }
        const data = await res.json();
        bubble('agent', data.content || '(no reply)');
      } catch (err) {
        stopTyping();
        errorBubble('Connection error. Check your network and try again.');
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    send.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    });

    bubble('agent', "Hi! I'm MainDesk, the front-desk assistant. How can I help — booking, hours, or something else?");
  </script>
</body>
</html>
