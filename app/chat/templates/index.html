<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MainDesk — Chat with the front desk</title>
  <style>
    :root {
      --ink: #0c1c2e;
      --ink-mid: #2c4055;
      --ink-soft: #5b7185;
      --teal: #008c97;
      --teal-pale: #e0f5f6;
      --line: #e2e8ec;
      --mist: #f0fafb;
      --white: #ffffff;
      --green-live: #22c55e;
      --error-bg: #fff4f4;
      --error-line: #f5c2c5;
      --error-text: #b32228;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--mist);
      color: var(--ink);
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header { padding-bottom: 14px; border-bottom: 1px solid var(--line); }
    header h1 { font-size: 1.1rem; margin: 0; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    header .sub { font-size: 0.82rem; color: var(--ink-soft); margin-top: 4px; }
    .pill {
      display: inline-flex; gap: 6px; align-items: center;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--teal); background: var(--teal-pale);
      border-radius: 99px; padding: 3px 10px;
    }
    .pill::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green-live); box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
    }
    main {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; gap: 10px;
      overflow-y: auto;
      padding: 16px 4px;
    }
    .bubble {
      max-width: 78%; padding: 10px 14px; border-radius: 14px;
      line-height: 1.5; word-wrap: break-word; white-space: pre-wrap;
    }
    .bubble.agent {
      background: var(--white); border: 1px solid var(--line);
      border-bottom-left-radius: 4px; align-self: flex-start;
    }
    .bubble.user {
      background: var(--ink); color: var(--white);
      border-bottom-right-radius: 4px; align-self: flex-end;
    }
    .typing {
      display: inline-flex; gap: 5px; padding: 14px;
      background: var(--white); border: 1px solid var(--line);
      border-radius: 14px; border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink-soft); opacity: 0.5;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%           { transform: translateY(-3px); opacity: 1; }
    }
    .error {
      font-size: 0.85rem; color: var(--error-text);
      padding: 8px 14px; background: var(--error-bg);
      border: 1px solid var(--error-line); border-radius: 8px;
      align-self: flex-start; max-width: 78%;
    }
    footer { padding-top: 12px; border-top: 1px solid var(--line); }
    .inputbar { display: flex; gap: 8px; align-items: flex-end; }
    textarea {
      flex: 1; resize: none; padding: 10px 14px;
      border: 1px solid var(--line); border-radius: 12px;
      font: inherit; color: var(--ink); background: var(--white);
      max-height: 140px; overflow-y: auto;
    }
    textarea:focus {
      outline: 2px solid var(--teal); outline-offset: -1px;
      border-color: transparent;
    }
    button.send {
      background: var(--ink); color: var(--white);
      border: 0; border-radius: 12px;
      padding: 10px 18px; font: inherit; font-weight: 600;
      cursor: pointer; min-width: 80px;
    }
    button.send:hover { background: #1b3550; }
    button.send:disabled { background: var(--ink-soft); cursor: not-allowed; }
    .hint { color: var(--ink-soft); font-size: 0.74rem; margin-top: 8px; text-align: center; }
    @media (max-width: 600px) {
      .wrap { padding: 14px 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .typing span { animation: none; opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>MainDesk <span class="pill">live</span></h1>
      <div class="sub">Try the front-desk agent. Ask about hours, booking, insurance, or anything a clinic patient would.</div>
    </header>
    <main id="conv" aria-live="polite"></main>
    <footer>
      <div class="inputbar">
        <textarea id="input" rows="1" placeholder="Type a message…" autofocus aria-label="Message"></textarea>
        <button id="send" class="send" type="button">Send</button>
      </div>
      <div class="hint">Demo mode · synthetic data only · no PHI</div>
    </footer>
  </div>
  <script>
    const conv = document.getElementById('conv');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    // Stable per-tab session so multi-turn memory persists across reloads.
    let sessionId = sessionStorage.getItem('maindesk-chat-session');
    if (!sessionId) {
      sessionId = 'web-' + Math.random().toString(36).slice(2, 11);
      sessionStorage.setItem('maindesk-chat-session', sessionId);
    }

    function bubble(role, text) {
      const b = document.createElement('div');
      b.className = 'bubble ' + role;
      b.textContent = text;
      conv.appendChild(b);
      conv.scrollTop = conv.scrollHeight;
    }
    function startTyping() {
      const t = document.createElement('div');
      t.className = 'typing'; t.id = 'typing';
      t.innerHTML = '<span></span><span></span><span></span>';
      conv.appendChild(t);
      conv.scrollTop = conv.scrollHeight;
    }
    function stopTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }
    function errorBubble(text) {
      const e = document.createElement('div');
      e.className = 'error'; e.textContent = text;
      conv.appendChild(e);
      conv.scrollTop = conv.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = ''; input.style.height = 'auto';
      bubble('user', text);
      send.disabled = true;
      startTyping();
      try {
        const res = await fetch('/webhooks/web', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, content: text }),
        });
        stopTyping();
        if (!res.ok) {
          errorBubble('The server returned ' + res.status + '. Try again in a moment.');
          return;
        }
        const data = await res.json();
        bubble('agent', data.content || '(no reply)');
      } catch (err) {
        stopTyping();
        errorBubble('Connection error. Check your network and try again.');
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    send.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    });

    // Opening message so the page isn't empty on first load.
    bubble('agent', "Hi! I'm MainDesk, the front-desk assistant. How can I help — booking, hours, or something else?");
  </script>
</body>
</html>
